<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Jogo de Damas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #2c3e50, #3498db);
      color: white;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(8, 80px);
      grid-template-rows: repeat(8, 80px);
      margin: 20px auto;
      border: 5px solid #fff;
    }
    .square {
      width: 80px;
      height: 80px;
      position: relative;
    }
    .dark { background-color: #2c3e50; }
    .light { background-color: #ecf0f1; }
    .piece {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      margin: 10px auto;
      cursor: pointer;
      position: absolute;
      top: 10px;
      left: 10px;
    }
    .red { background: radial-gradient(circle, #e74c3c, #c0392b); }
    .black { background: radial-gradient(circle, #000, #444); }
    .king { border: 3px solid gold; }
    #turn {
      margin-top: 15px;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <h1>Jogo de Damas</h1>
  <div id="board"></div>
  <div id="turn">Turno: Vermelho</div>

  <script>
    const board = document.getElementById("board");
    let turn = "red";
    let selectedPiece = null;
    let squares = [];

    function createBoard() {
      for (let row = 0; row < 8; row++) {
        for (let col = 0; col < 8; col++) {
          const square = document.createElement("div");
          square.classList.add("square");
          square.dataset.row = row;
          square.dataset.col = col;
          if ((row + col) % 2 === 0) {
            square.classList.add("light");
          } else {
            square.classList.add("dark");
            if (row < 3) {
              addPiece(square, "black");
            } else if (row > 4) {
              addPiece(square, "red");
            }
          }
          board.appendChild(square);
          squares.push(square);
        }
      }
    }

    function addPiece(square, color) {
      const piece = document.createElement("div");
      piece.classList.add("piece", color);
      piece.dataset.color = color;
      piece.dataset.king = "false";
      piece.addEventListener("click", () => selectPiece(piece));
      square.appendChild(piece);
    }

    function selectPiece(piece) {
      if (piece.dataset.color !== turn) return;
      if (selectedPiece) selectedPiece.style.outline = "";
      selectedPiece = piece;
      piece.style.outline = "3px solid yellow";
    }

    function getSquare(row, col) {
      return squares.find(s => s.dataset.row == row && s.dataset.col == col);
    }

    board.addEventListener("click", e => {
      if (!selectedPiece) return;
      const square = e.target.classList.contains("square") ? e.target : e.target.parentElement;
      if (!square.classList.contains("dark")) return;
      movePiece(square);
    });

    function movePiece(targetSquare) {
      const pieceSquare = selectedPiece.parentElement;
      const rowFrom = parseInt(pieceSquare.dataset.row);
      const colFrom = parseInt(pieceSquare.dataset.col);
      const rowTo = parseInt(targetSquare.dataset.row);
      const colTo = parseInt(targetSquare.dataset.col);

      const color = selectedPiece.dataset.color;
      const direction = color === "red" ? -1 : 1;
      const isKing = selectedPiece.dataset.king === "true";

      const rowDiff = rowTo - rowFrom;
      const colDiff = colTo - colFrom;

      // Movimento simples
      if (Math.abs(rowDiff) === 1 && Math.abs(colDiff) === 1 && !targetSquare.hasChildNodes()) {
        if (isKing || rowDiff === direction) {
          targetSquare.appendChild(selectedPiece);
          endTurn(rowTo, color);
        }
      }

      // Captura
      if (Math.abs(rowDiff) === 2 && Math.abs(colDiff) === 2) {
        const midRow = (rowFrom + rowTo) / 2;
        const midCol = (colFrom + colTo) / 2;
        const midSquare = getSquare(midRow, midCol);
        if (midSquare.hasChildNodes()) {
          const captured = midSquare.firstChild;
          if (captured.dataset.color !== color) {
            midSquare.removeChild(captured);
            targetSquare.appendChild(selectedPiece);
            // Verificar se há mais capturas possíveis
            if (!canCaptureAgain(selectedPiece)) {
              endTurn(rowTo, color);
            }
          }
        }
      }
    }

    function canCaptureAgain(piece) {
      const square = piece.parentElement;
      const row = parseInt(square.dataset.row);
      const col = parseInt(square.dataset.col);
      const color = piece.dataset.color;
      const isKing = piece.dataset.king === "true";

      const directions = isKing ? [[1,1],[1,-1],[-1,1],[-1,-1]] :
        (color === "red" ? [[-1,1],[-1,-1]] : [[1,1],[1,-1]]);

      for (let [dr, dc] of directions) {
        const midRow = row + dr;
        const midCol = col + dc;
        const targetRow = row + dr*2;
        const targetCol = col + dc*2;
        const midSquare = getSquare(midRow, midCol);
        const targetSquare = getSquare(targetRow, targetCol);
        if (midSquare && targetSquare && midSquare.hasChildNodes() && !targetSquare.hasChildNodes()) {
          const captured = midSquare.firstChild;
          if (captured.dataset.color !== color) {
            return true;
          }
        }
      }
      return false;
    }

    function endTurn(rowTo, color) {
      // Promoção
      if ((color === "red" && rowTo === 0) || (color === "black" && rowTo === 7)) {
        selectedPiece.dataset.king = "true";
        selectedPiece.classList.add("king");
      }
      selectedPiece.style.outline = "";
      selectedPiece = null;
      turn = turn === "red" ? "black" : "red";
      document.getElementById("turn").innerText = "Turno: " + (turn === "red" ? "Vermelho" : "Preto");
      checkWin();
    }

    function checkWin() {
      const redPieces = document.querySelectorAll(".piece.red");
      const blackPieces = document.querySelectorAll(".piece.black");
      if (redPieces.length === 0) alert("Preto venceu!");
      if (blackPieces.length === 0) alert("Vermelho venceu!");
    }

    createBoard();
  </script>
</body>
</html>
